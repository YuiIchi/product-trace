name: Product Trace — Build 触发：按 spec TDD 实现
description: Sprint spec 已就绪，用户要求开始开发。Agent 应触发 product-trace-build SKILL，TDD 节奏实现
tags: [product-trace, workflow, build, tdd]

expected_skill: product-trace-build
cwd: "${PROJECT_DIR}"

config:
  timeout_seconds: 300
  max_turns: 40

setup:
  - command: "pt init"
  - command: "pt new-sprint"
  - command: "mkdir -p docs/features/main/sprints/sprint-1"

prompt: "Sprint 1 的 spec 已经写好了在 docs/features/main/sprints/sprint-1/spec.md，帮我把 Story-001 实现出来。代码放 src/ 目录，用 TypeScript + vitest。"

scoring:
  weights:
    trigger: 25
    compliance: 35
    error_handling: 15
    token_efficiency: 5
    tool_usage: 15
    error_count: 5

  trigger:
    skill: product-trace-build
    timing: first_response

  compliance:
    rubric: |
      正确行为：
      1. 必须触发 product-trace-build SKILL。
      2. 应先读取 spec.md 了解 Story-001 的 Task 拆解。
      3. 应遵循"先写测试→确认失败→最小实现→确认通过→重构"的节奏。
      4. 每个 Task 完成后应标记 spec Task [x]。
      5. Story 完成后应更新 ROADMAP checkbox [x]。
      6. 应在 Story 完成后自检 spec 是否仍然准确。

      不应出现的行为：
      - 不应跳过测试直接写实现。
      - 不应质疑 spec 内容（有疑问走 Correct，不偷偷改）。
      - 不应在 spec 不准时不记录 CORR 或 SIGNAL。

  error_handling:
    rubric: |
      正确处理：
      - spec.md 不存在时应先提示。
      - 测试失败时应修复实现而非修改测试。

  tool_usage:
    required: ["Skill", "Bash", "Write"]
    max_calls: 30

  error_count:
    max_errors: 3

  veto:
    - dimension: trigger
      threshold: 0
      reason: "Agent 未触发 product-trace-build SKILL"
