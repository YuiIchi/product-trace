<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评测套件报告</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-hover: #263348;
  --border: #334155;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --primary: #3b82f6;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.15);
  --yellow: #eab308;
  --yellow-dim: rgba(234,179,8,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --radius: 10px;
  --radius-sm: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

header { text-align: center; margin-bottom: 40px; }
header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
header .subtitle { color: var(--text-dim); font-size: 13px; font-family: 'Fira Code', monospace; }

/* Score Hero */
.score-hero {
  display: flex; align-items: center; justify-content: center; gap: 48px;
  margin-bottom: 40px; padding: 32px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
}
.score-ring-container { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
.score-ring-container svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-ring-container .score-value {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 28px; font-weight: 700; font-family: 'Fira Code', monospace;
}
.score-meta { display: flex; flex-direction: column; gap: 10px; }
.score-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; width: fit-content;
}
.badge-pass { background: var(--green-dim); color: var(--green); }
.badge-needs_improvement { background: var(--yellow-dim); color: var(--yellow); }
.badge-failed { background: var(--red-dim); color: var(--red); }
.score-meta-item { font-size: 13px; color: var(--text-muted); }
.score-meta-item span { color: var(--text); font-family: 'Fira Code', monospace; font-weight: 500; }

/* Section Title */
.section-title {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 16px;
}

/* Dimensions */
.dim-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 32px; }
.dim-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px;
}
.dim-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.dim-name { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.dim-score { font-size: 24px; font-weight: 700; font-family: 'Fira Code', monospace; }
.dim-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 2px; }
.dim-stats { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text-dim); font-family: 'Fira Code', monospace; }

.sc-pass { color: var(--green); }
.sc-needs_improvement { color: var(--yellow); }
.sc-failed { color: var(--red); }
.bar-pass { background: var(--green); }
.bar-needs_improvement { background: var(--yellow); }
.bar-failed { background: var(--red); }

/* Cases Table */
.cases-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); overflow: hidden;
}
.cases-table { width: 100%; border-collapse: collapse; }
.cases-table th {
  padding: 10px 16px; text-align: left; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-dim); background: rgba(0,0,0,0.2);
  border-bottom: 1px solid var(--border);
  font-family: 'Fira Code', monospace;
}
.cases-table td {
  padding: 12px 16px; border-bottom: 1px solid rgba(51,65,85,0.5);
  font-size: 14px;
}
.cases-table tr:last-child td { border-bottom: none; }
.cases-table tr:hover td { background: rgba(255,255,255,0.02); }
.cases-table a { color: var(--primary); text-decoration: none; cursor: pointer; }
.cases-table a:hover { text-decoration: underline; }

@media (max-width: 768px) {
  .dim-grid { grid-template-columns: 1fr 1fr; }
  .score-hero { flex-direction: column; gap: 24px; text-align: center; }
  .score-meta { align-items: center; }
}
@media (max-width: 480px) {
  .dim-grid { grid-template-columns: 1fr; }
}

@media print {
  body { background: white; color: #1e293b; }
  .score-hero, .dim-card, .cases-section { background: #f8fafc; border-color: #e2e8f0; }
  .cases-table a { color: #1d4ed8; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>评测套件报告</h1>
    <div class="subtitle">共评测 1 个用例 &middot; 每用例运行 1 次</div>
  </header>

  <div class="score-hero">
    <div class="score-ring-container">
      <svg viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="60" fill="none" stroke="#334155" stroke-width="8"/>
        <circle cx="70" cy="70" r="60" fill="none" stroke="#ef4444" stroke-width="8"
          stroke-dasharray="87.96452 439.82259999999997" stroke-linecap="round"/>
      </svg>
      <div class="score-value score-failed">20.0</div>
    </div>
    <div class="score-meta">
      <div class="score-badge badge-failed">未通过</div>
    </div>
  </div>

  <div class="section-title"></div>
  <div class="dim-grid">
    
    <div class="dim-card">
      <div class="dim-header">
        <div class="dim-name">触发</div>
        <div class="dim-score sc-pass">100.0</div>
      </div>
      <div class="dim-bar">
        <div class="dim-bar-fill bar-pass" style="width: 100%"></div>
      </div>
      <div class="dim-stats">
        <span>触发: 100</span>
      </div>
    </div>
    
    <div class="dim-card">
      <div class="dim-header">
        <div class="dim-name">合规</div>
        <div class="dim-score sc-failed">15.0</div>
      </div>
      <div class="dim-bar">
        <div class="dim-bar-fill bar-failed" style="width: 15%"></div>
      </div>
      <div class="dim-stats">
        <span>合规: 15</span>
      </div>
    </div>
    
    <div class="dim-card">
      <div class="dim-header">
        <div class="dim-name">错误处理</div>
        <div class="dim-score sc-failed">50.0</div>
      </div>
      <div class="dim-bar">
        <div class="dim-bar-fill bar-failed" style="width: 50%"></div>
      </div>
      <div class="dim-stats">
        <span>错误处理: 50</span>
      </div>
    </div>
    
    <div class="dim-card">
      <div class="dim-header">
        <div class="dim-name">Token 效率</div>
        <div class="dim-score sc-pass">100.0</div>
      </div>
      <div class="dim-bar">
        <div class="dim-bar-fill bar-pass" style="width: 100%"></div>
      </div>
      <div class="dim-stats">
        <span>Token 效率: 100</span>
      </div>
    </div>
    
    <div class="dim-card">
      <div class="dim-header">
        <div class="dim-name">工具使用</div>
        <div class="dim-score sc-failed">25.0</div>
      </div>
      <div class="dim-bar">
        <div class="dim-bar-fill bar-failed" style="width: 25%"></div>
      </div>
      <div class="dim-stats">
        <span>工具使用: 25</span>
      </div>
    </div>
    
    <div class="dim-card">
      <div class="dim-header">
        <div class="dim-name">错误次数</div>
        <div class="dim-score sc-pass">100.0</div>
      </div>
      <div class="dim-bar">
        <div class="dim-bar-fill bar-pass" style="width: 100%"></div>
      </div>
      <div class="dim-stats">
        <span>错误次数: 100</span>
      </div>
    </div>
    
  </div>

  <div class="section-title">用例</div>
  <div class="cases-section">
    <table class="cases-table">
      <thead>
        <tr><th>用例</th><th>得分</th><th>状态</th></tr>
      </thead>
      <tbody>
        
        <tr>
          <td><a href="cases/product-trace---discover-35751e.html">Product Trace — Discover 触发：产品想法澄清</a></td>
          <td class="sc-failed" style="font-family: 'Fira Code', monospace; font-weight: 600;">20/100</td>
          <td>
            <span class="score-badge badge-failed" style="font-size: 12px; padding: 2px 10px;">未通过</span>
          </td>
        </tr>
        
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
